experiment_name: "social-media-user-behaviour"
registered_model_name: "smuba-model"

# Local MLflow tracking store. A file store alone can't back the Model
# Registry, so we use a local SQLite file - still zero external infra.
mlflow_tracking_uri: "sqlite:///mlflow.db"

use_pca: false
pca_variance_threshold: 0.95

n_optuna_trials: 30

# Metric used to decide whether a freshly (re)trained model replaces the
# one currently in the "Production" stage.
promotion_metric: "f1_weighted"   # use "rmse" for regression
lower_is_better: false            # true if promotion_metric is an error metric like rmse
