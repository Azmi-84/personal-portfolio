# One entry per algorithm. This file replaces the old
# model_selection_with_pca / model_selection_without_pca / 6-algorithm
# duplication - "with or without PCA" becomes a single boolean flag
# (use_pca) passed at train time, not a separate folder tree.
models:
  random_forest:
    classification: sklearn.ensemble.RandomForestClassifier
    regression: sklearn.ensemble.RandomForestRegressor
    search_space:
      n_estimators: [100, 800]
      max_depth: [3, 20]
      min_samples_split: [2, 20]

  gradient_boosting:
    classification: sklearn.ensemble.GradientBoostingClassifier
    regression: sklearn.ensemble.GradientBoostingRegressor
    search_space:
      n_estimators: [100, 600]
      learning_rate: [0.01, 0.3]
      max_depth: [2, 10]

  adaptive_boosting:
    classification: sklearn.ensemble.AdaBoostClassifier
    regression: sklearn.ensemble.AdaBoostRegressor
    search_space:
      n_estimators: [50, 500]
      learning_rate: [0.01, 2.0]

  k_nearest_neighbors:
    classification: sklearn.neighbors.KNeighborsClassifier
    regression: sklearn.neighbors.KNeighborsRegressor
    search_space:
      n_neighbors: [3, 50]
      weights: ["uniform", "distance"]

  extreme_gradient_boosting:
    classification: xgboost.XGBClassifier
    regression: xgboost.XGBRegressor
    search_space:
      n_estimators: [100, 800]
      max_depth: [2, 12]
      learning_rate: [0.005, 0.3]

  light_gradient_boosting_machine:
    classification: lightgbm.LGBMClassifier
    regression: lightgbm.LGBMRegressor
    search_space:
      n_estimators: [100, 800]
      max_depth: [3, 12]
      learning_rate: [0.005, 0.3]
